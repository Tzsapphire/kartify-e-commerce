version: 2

sources:
  - name: staging
    tables:
      - name: stg_categories
        columns:
          - name: category_id
            data_type: bigint
          - name: category_name
            data_type: text
          - name: category_slug
            data_type: text
          - name: cat_is_active
            data_type: boolean
          - name: created_at
            data_type: timestamp with time zone
          - name: updated_at
            data_type: timestamp with time zone

      - name: stg_coupons
        columns:
          - name: coupon_id
            data_type: bigint
          - name: coupon_code
            data_type: text
          - name: discount_pct
            data_type: double precision
          - name: max_uses
            data_type: bigint
          - name: used_count
            data_type: bigint
          - name: is_active
            data_type: boolean
          - name: expires_at
            data_type: timestamp without time zone
          - name: created_at
            data_type: timestamp with time zone
          - name: updated_at
            data_type: timestamp with time zone

      - name: stg_customers
        columns:
          - name: customer_id
            data_type: bigint
          - name: first_name
            data_type: text
          - name: last_name
            data_type: text
          - name: full_name
            data_type: text
          - name: email
            data_type: text
          - name: phone
            data_type: text
          - name: address
            data_type: text
          - name: city
            data_type: text
          - name: state
            data_type: text
          - name: country
            data_type: text
          - name: postal_code
            data_type: text
          - name: password
            data_type: text
          - name: is_active
            data_type: boolean
          - name: created_at
            data_type: timestamp with time zone
          - name: updated_at
            data_type: timestamp with time zone

      - name: stg_inventory
        columns:
          - name: inventory_id
            data_type: bigint
          - name: product_id
            data_type: bigint
          - name: quantity
            data_type: bigint
          - name: reorder_level
            data_type: bigint
          - name: created_at
            data_type: timestamp with time zone
          - name: updated_at
            data_type: timestamp with time zone

      - name: stg_order_items
        columns:
          - name: order_item_id
            data_type: bigint
          - name: order_id
            data_type: bigint
          - name: product_id
            data_type: bigint
          - name: quantity
            data_type: bigint
          - name: unit_price
            data_type: double precision
          - name: total_price
            data_type: double precision
          - name: created_at
            data_type: timestamp with time zone
          - name: updated_at
            data_type: timestamp with time zone

      - name: stg_orders
        columns:
          - name: order_id
            data_type: bigint
          - name: customer_id
            data_type: bigint
          - name: coupon_id
            data_type: double precision
          - name: order_status
            data_type: text
          - name: subtotal
            data_type: double precision
          - name: discount_amount
            data_type: double precision
          - name: total
            data_type: double precision
          - name: notes
            data_type: text
          - name: created_at
            data_type: timestamp with time zone
          - name: updated_at
            data_type: timestamp with time zone

      - name: stg_payments
        columns:
          - name: payment_id
            data_type: bigint
          - name: order_id
            data_type: bigint
          - name: payment_method
            data_type: text
          - name: payment_status
            data_type: text
          - name: amount
            data_type: double precision
          - name: payment_reference
            data_type: text
          - name: created_at
            data_type: timestamp with time zone
          - name: updated_at
            data_type: timestamp with time zone

      - name: stg_products
        columns:
          - name: product_id
            data_type: bigint
          - name: category_id
            data_type: bigint
          - name: product_name
            data_type: text
          - name: product_slug
            data_type: text
          - name: product_description
            data_type: text
          - name: price
            data_type: double precision
          - name: image_url
            data_type: text
          - name: is_active
            data_type: boolean
          - name: created_at
            data_type: timestamp with time zone
          - name: updated_at
            data_type: timestamp with time zone

      - name: stg_reviews
        columns:
          - name: review_id
            data_type: bigint
          - name: product_id
            data_type: bigint
          - name: customer_id
            data_type: bigint
          - name: rating
            data_type: bigint
          - name: comment
            data_type: text
          - name: created_at
            data_type: timestamp with time zone
          - name: updated_at
            data_type: timestamp with time zone

      - name: stg_shipping
        columns:
          - name: shipping_id
            data_type: bigint
          - name: order_id
            data_type: bigint
          - name: status
            data_type: text
          - name: carrier
            data_type: text
          - name: tracking_number
            data_type: text
          - name: shipping_address
            data_type: text
          - name: city
            data_type: text
          - name: state
            data_type: text
          - name: country
            data_type: text
          - name: postal_code
            data_type: text
          - name: shipped_at
            data_type: timestamp with time zone
          - name: delivered_at
            data_type: timestamp with time zone
          - name: created_at
            data_type: timestamp with time zone
          - name: updated_at
            data_type: timestamp with time zone

